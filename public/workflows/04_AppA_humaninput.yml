    - data:
        code: "import json\n\ndef main(research_package_text: str) -> dict:\n    try:\n        research_package = json.loads(research_package_text)\n    except Exception:\n        return {\"validation_status\": \"blocked\", \"validation_errors\": [\"invalid_json_from_intake\"], \"validation_warnings\": []}\n\n    required = [\"case_id\", \"research_question\", \"hypotheses\", \"variables\"]\n    errors = []\n    warnings = []\n    for key in required:\n        value = research_package.get(key)\n        if value is None or value == \"\" or value == []:\n            errors.append(\"missing:\" + key)\n\n    roles = {v.get(\"role\") for v in research_package.get(\"variables\", [])}\n    if \"outcome\" not in roles:\n        errors.append(\"missing:outcome_variable\")\n    if not ({\"treatment\", \"exposure\"} & roles):\n        warnings.append(\"missing:core_explanatory_variable\")\n\n    if research_package.get(\"input_conflicts\", []):\n        warnings.append(\"input_conflicts_require_review\")\n\n    status = \"blocked\" if errors else (\"review\" if warnings else \"ready\")\n    return {\"validation_status\": status, \"validation_errors\": errors, \"validation_warnings\": warnings}\n"
        code_language: python3
        desc: ''
